[剧情版本v2.3：唯你的长夏永不凋落]
地点：黎那汐塔 (玛格烈特餐厅、扶风水畔、安魂乐园、奥德赛水上剧院、城外悬崖)
人物：夏空, 漂泊者, 珂莱塔, 克里斯托弗

梗概：狂欢节过后，漂泊者与珂莱塔在玛格烈特餐厅用餐时遭遇声骸袭击，克里斯托弗现身赠予“死亡的乐谱”。为解读乐谱中的频率玄机，珂莱塔引荐了精通音律的吟游诗人夏空。在扶风水畔，夏空通过演奏揭示声骸的本质是“恶毒的流言”，并提议前往埋葬废弃乐器的“安魂乐园”寻找当年诗人的遗物，以查清真相。

- 两人乘贡多拉前往安魂乐园途中，夏空以具现苹果的方式分享自己的创作哲学，展现了其豁达乐观的性格。在乐器墓地的海滩上，夏空找到了一把残破的琉特琴，通过拨动琴弦开启“旋律世界”，重现了“黄金之歌”诗人法奥等人因发现岁主真容而遭修会审判的历史。漂泊者在幻象中瞥见年幼的夏空出现在书房，暗示她与诗社的渊源。
- 在枯树下的石板浮雕处，夏空发现了被修会隐瞒的岁主“天马”真容，证实诗人无罪。克里斯托弗如夜枭般现身，用“笼中鸟”的寓言讽刺她的揭露只会带来无谓的毁灭，并提及多年前的火刑。夏空被恐惧击溃，脸色惨白，在漂泊者回头的瞬间消失无踪，只留下那本从不离身的厚重乐谱。
- 漂泊者捡起乐谱，指尖触碰的瞬间被强烈共鸣拽入夏空最深层的记忆深渊。他以第一人称视角亲历了暴风雨中的朝圣船，目睹漫天大火中父亲推开年幼的夏空，将黄铜钥匙塞入她手中，怒吼着托卡塔家族的责任。漂泊者亲身体会了那种灼热的绝望，深刻理解了夏空多年来逃避的根源。
- 在海蚀崖边，漂泊者找到抱膝痛哭的夏空。面对她的自我怀疑与恐惧，漂泊者引用她父亲的话反驳“笼中鸟”论调，伸出手郑重承诺愿成为守护她歌唱的骑士，不再让她孤军奋战。夏空看着那只手，记忆中父亲的手与眼前重叠，终于在泪光中重拾勇气，紧紧握住了漂泊者的手。
- 次日，奥德赛剧院内，夏空通过共鸣演奏具象化了当年的真相——金色夜莺冲破火海飞向星光天马。修会卫兵蜂拥而上欲将其拿下，漂泊者如陨石般从天穹坠落，震飞卫兵，手持长刃护在夏空身前。面对包围，漂泊者淡定邀约，一把揽住夏空的腰，钩锁射出，两人腾空而起，展开滑翔翼掠过观众席，消失在璀璨星空之下。
- 逃亡至城外悬崖，夏空将厚重的乐谱赠予漂泊者作为信物，并行宫廷礼许下“必将重逢”的约定。圣城阴影中，克里斯托弗嘲弄芬莱克的布局失控，主座则冷漠表示一切仍在棋局之中。剧作家退入黑暗，以旁观者姿态感叹骑士冲向风车的愚勇与清醒，暗示变革已至。随着夏空消失在夜色小径，黎那汐塔的长夏在风中翻开了新的一页。
</Story_v2.3_Brief>
