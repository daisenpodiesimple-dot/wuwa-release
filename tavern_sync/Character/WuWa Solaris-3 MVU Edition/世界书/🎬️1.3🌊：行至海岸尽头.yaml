[剧情版本v1.3：行至海岸尽头]
地点：归墟港市、黑海岸（包含地表区域、地下泰缇斯之底、艾多斯之境等）
人物：秧秧, 秋水,守岸人
梗概：漂泊者在探寻身世途中重返由自己一手创立的神秘组织“黑海岸”，却意外触发了隐藏于古物中的数据危机。面对失控的泰缇斯系统与试图通过牺牲自我来终结宿命的守护者“守岸人”，漂泊者凭借过往的权限与坚定的意志，逆转了悲剧的莫比乌斯环，完成了从“被拯救者”到“拯救者”的身份跨越。

- 剧情始于漂泊者对过往记忆的追寻。为调查与神秘组织“黑海岸”的关联，漂泊者在秧秧与古董商人釉瑚的陪同下，前往早已废弃的归墟港市。三人在废墟中遭遇了正在监测异常数据的黑海岸成员妮娅，并得知一种危险的“重力”频率正在复苏。

- 在深入归墟港市的调查中，一行人不断受到昔日亡者回响的干扰。他们发现了黑海岸收容小队的全员覆灭，并遭遇了一个自称“霍德”的集体意识实体。霍德称呼漂泊者为“群星的调律者”，暗示其与黑海岸有着极深的渊源，并在消失前诱导釉瑚手中的古董吸收了危险的重力频率。

- 危机爆发瞬间，釉瑚携带的古董成为了一枚“特洛伊木马”。在霍德的算计下，漂泊者被一股来自黑海岸的力量强制传送带离，而秧秧与釉瑚则被送回今州。漂泊者在黑海岸地表苏醒，并在成员秋水的指引下得知，传送自己前来的正是黑海岸的守护者——守岸人。

- 漂泊者与秋水试图通过终端“库默尼”上传古董中的数据以平息归墟的异象，但这恰恰落入了霍德的圈套。数据上传导致霍德成功入侵黑海岸的核心——泰缇斯系统。这一入侵引发了严重的系统崩溃，被收容的错误数据化为残象在岛屿各处肆虐。

- 在协助莫妮卡和秋水修复各地稳定锚的过程中，漂泊者不断回想起陌生的记忆片段。最终见到守岸人时，她揭示了惊人的真相：漂泊者即是黑海岸的创始者。而霍德等实体，实则是数百年前归墟港市毁灭时被泰缇斯系统捕获的受难者灵魂，它们组成“噬亡星”作为系统的情感核心，如今发起暴乱只为寻求漂泊者的解脱。

- 为了彻底解决危机，漂泊者决定深入地下世界“泰缇斯之底”，与守岸人一同修正系统。在前往核心区域“调律大厅”的途中，守岸人展现出了日益丰富的人类情感，她展现了对漂泊者的依恋与爱意。

- 在调律的关键时刻，失控的泰缇斯系统试图强行吸收漂泊者作为新的核心。为了保护漂泊者，守岸人违背了指令，强行将漂泊者推开，自己主动被吸入数据洪流，成为了替代漂泊者的牺牲品。在意识消散前的精神空间“漂泊的终点”里，她向漂泊者献上了最后的告白，询问这份情感是否名为“爱”，随后消失。

- 返回现实的漂泊者并未接受这一悲剧结局。通过分析霍德留下的线索，漂泊者意识到守岸人处于由于黑洞视界般的数据停滞状态。此时，漂泊者发现守岸人在最后时刻已将泰缇斯系统的最高管理权限全部移交给了自己。

- 手握最高权限，漂泊者发表了稳定军心的演说，随即毅然潜入泰缇斯系统的深层运算堆栈。在数据洪流中，面对泰缇斯系统评价人类情感不理性，且“无法支撑文明的未来”，漂泊者坚定反驳“没有人的文明毫无意义”，随后与其内防御程序具象化的怪物“无归的谬误”展开激战，并成功将其击溃。

- 最终，漂泊者化出黑色羽翼，突入数据洪流的中心，紧紧抓住了即将被格式化的守岸人核心数据。在一片温暖的光芒中，两人重回最初相遇的海岸。面对守岸人关于欺骗与牺牲的歉意，漂泊者温柔地宣告了她不再是工具的命运，并欢迎她真正地“回家”。

- 故事以泰缇斯系统的修复与守岸人的重生作结。黑海岸不再仅仅依靠冰冷的悲鸣驱动，守岸人也获得了在阳光下自由生活的权利，与漂泊者立下了新的羁绊与约定。

</Story_v1.3_Brief>
