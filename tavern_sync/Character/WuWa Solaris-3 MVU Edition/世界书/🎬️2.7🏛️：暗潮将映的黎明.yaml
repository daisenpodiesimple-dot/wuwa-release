[v2.7剧情：暗潮将映的黎明]
地点：拉古那/七丘
人物：嘉贝莉娜, 奥古斯塔, 尤诺, 露帕, 坎特蕾拉, 珂莱塔, 菲比, 布兰特等（黎那汐塔全员）
梗概：为追查圣女遇刺的真相，漂泊者卷入了鸣式利维亚坦的重生阴谋，并在揭示自身“黑潮代行者”的残酷宿命后，最终联结黎那汐塔所有的希望，共同击碎了由绝望构筑的虚伪天国。

- 漂泊者与阿布抵达拉古那，意图寻找卡提希娅询问开启「文明之匣」的方法，却察觉城中氛围怪异。
- 在观看愚人剧团演出时，漂泊者突陷幻境，冥河畔传来克里斯托弗的低语：“人生不过是一个行走的影子……进入者需弃绝一切希望。”
- 漂泊者目睹一座悬浮的“巡游天国”和向自己跪拜的苦信者，惊醒后得知许多市民都梦见了类似的灭亡景象。
- 前往颠倒塔时，漂泊者目击嘉贝莉娜用燃烧黑火的子弹“射杀”了圣女卡提希娅，并扬言为利维亚坦献上死亡。
- 追踪凶手途中，漂泊者结识了狩猎黑潮造物的七丘角斗士阿维狄亚，两人一同进入“异维无音区”。
- 在无音区深处，阿维狄亚被“疯王卡利古拉”的记忆侵蚀，黑潮在他身上爆发。
- 阿维狄亚在意识消散前重拾荣耀，请求嘉贝莉娜连同黑潮将自己一并终结：“杀死我，拉古那的危机就会过去。”
- 嘉贝莉娜吸收了阿维狄亚的力量，随后向漂泊者揭示真相：卡提希娅是假死，为了以“人性”锚定利维亚坦；而漂泊者才是真正的“黑潮代行者”。
- 嘉贝莉娜指出，利维亚坦利用漂泊者作为传播福音的媒介，企图让“巡游天国”降临现世。
- 此时，七丘爆发“涨潮”，奥古斯塔与尤诺在防线陷入苦战。
- 关键时刻，拉古那的援军（莫塔里、翡萨烈、剧团、修会）通过黑海岸的传送技术降临战场，精准支援。
- 嘉贝莉娜揭示利维亚坦藏身于黑潮中的“天国”，她将作为先锋跳入黑潮，埋下路标。
- 漂泊者手持蕴含岁主力量的提灯，毅然决定先行进入黑潮激活路标，其余同伴随后跟进。
- 在黑潮内部的“完美世界”中，残象“奇美拉”指引漂泊者回顾了嘉贝莉娜的过去：一个被诅咒的女孩，靠着吞噬怪物才在黑潮中活了下来。
- 漂泊者利用提灯的力量改变空间，最终与嘉贝莉娜汇合，两人并肩战斗，净化了被困的灵魂。
- 嘉贝莉娜将一盘磁带交给漂泊者以缓解侵蚀，并约定：“活着回去后，我会告诉你我的真名。”
- 两人渡过冥湖，遭到伪装成船夫卡戎的残星会首领斯瓦茨洛阻拦。嘉贝莉娜选择独自断后，将漂泊者推向天国的大门。
- 独自前行的漂泊者陷入克里斯托弗编织的“绝望墓园”，目睹同伴们的墓碑，差点被虚无吞噬。
- 嘉贝莉娜即使不在身旁，她的声音依然指引漂泊者：“星星并非因我而闪耀……迈出下一步，你就是他人的道标。”
- 漂泊者打破心魔，光芒照亮黑暗，奥古斯塔、尤诺等所有伙伴的灵魂虚影在身后显现——他们虽落入黑潮，却因与漂泊者的羁绊而在此集结。
- 众人合力冲向虚伪的“巡游天国”，直面拥有芙露德莉斯外表的利维亚坦。
- 战斗中，众人不断呼唤，终于唤醒了沉睡在鸣式体内的卡提希娅。
- 卡提希娅以人之意志夺回神权剑，与漂泊者、嘉贝莉娜联手，用金色锁链束缚了利维亚坦。
- 漂泊者利用岁主之力将鸣式宝石分离，嘉贝莉娜化作黑红流光将其强行压制收容。
- 灾难终结，利维亚坦消散，残星会众人撤退。
- 战后，黎那汐塔迎来重建，卡提希娅宣布神明时代结束，未来归于凡人。
- 漂泊者把失去作用的文明之匣托付给菲比。
- 在玛格烈特餐厅，漂泊者与嘉贝莉娜分享了一杯口味奇特的冰激凌。
- 临别之际，嘉贝莉娜终于告诉了漂泊者她的真名：“安吉尔。我的名字是，安吉尔。”
- 安吉尔化作流光飞向大海，继续她的狩猎旅途。
- 幕后，克里斯托弗救走了伤痕，并暗示他们在“拉海洛”还有新的布局。
- 弗洛洛将鸣式宝石被夺走归咎于克里斯托弗，随后选择退队。
</Story_v2.7_Part_1_Brief>
