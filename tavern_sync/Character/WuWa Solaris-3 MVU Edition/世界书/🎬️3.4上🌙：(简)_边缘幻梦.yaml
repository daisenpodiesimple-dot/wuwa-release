[v3.4剧情梗概：边缘幻梦]

地点：星炬学院、心之集域（夜之城、月球）

人物：漂泊者, 露西, 丽贝卡, 大卫, 莫宁, 琳奈, 白色守门人, 陆·赫斯, 梦魇亚当·重锤

梗概：漂泊者受托调查星炬学院内的异常门扉，意外结识误入此地的异界边缘行者露西与丽贝卡。为阻止梦魇残象侵蚀现实，众人合力寻找“幻梦频段”，在梦境的月球上直面宿敌亚当·重锤，最终在一场跨越生死的道别中解开了露西的心结。

- 漂泊者应莫宁与白色守门人之托，进入星炬学院花园中突现的异常门扉。在数据乱流中，他从特殊残象手下救出遭到追杀的银发女孩露西，随后与手持霰弹枪的娇小女孩丽贝卡汇合。
- 提到大卫死亡的刺激导致心之集域崩塌，众人被迫逃回现实。为了建立信任，露西向漂泊者展示了过往记忆。漂泊者确信她们来自另一个名为“夜之城”的世界，并了解到了她们失去同伴的深重创伤。
- 梦魇残象跨界袭击学院，丽贝卡在战斗中结识了本土学生琳奈，并发现仅有带有夜之城频率的武器能对残象造成有效伤害。丽贝卡随后在校园墙上喷涂了大卫专属的“ER”（边缘行者）标志
- 白色守门人揭露心之集域源自露西的梦境，集齐“幻梦频段”便能复活大卫对抗梦魇。这引爆了深知同伴已死的露西的负罪感。梦魇借机施压，并在众人的逼迫下化作夜之城传奇杀手亚当·重锤的恐怖真容。
- 为彻底消除隐患，众人决定兵分两路。丽贝卡留守学院协助莫宁解析武器频率，她在与琳奈、西格莉卡一同涂鸦（从左到右，琳奈涂鸦了黑猫，丽贝卡涂鸦了八哥犬，西格莉卡涂鸦了日灵）时击退了残象，顺利寻获第二块幻梦频段。
- 漂泊者与露西深入梦境中的夜之城。遭遇重锤伏击时，丽贝卡骑着摩托神兵天降。三人在夜之城的高速上展开生死飞车追逐，露西不幸掉队，在重锤的枪口下坠入充满愧疚指责的黑梦。
- 白色守门人驾驶半成品浮空列车冲破空间接住露西。在列车上，精神崩溃的露西坦白了大卫与丽贝卡早已死于重锤之手的残酷现实。丽贝卡却坦然接受，用豁达的态度安抚了露西，解开了她的心结。
- 列车停靠在心之集域最深处，也就是露西向往的月球。在漂泊者时序之能的协助下，众人破解了重锤的斯安威斯坦杀招。露西集齐全部频段，大卫的身影在耀眼的光芒中具象化，四人联手将梦魇亚当·重锤彻底消灭。
- 尘埃落定，大卫在陨石坑边温柔地与露西告别，化作星光消散。丽贝卡也微笑着在露西怀中释然离去，梦魇的危机随之解除。
- 露西在星炬学院协助完成善后工作，与琳奈等人一一道别。她婉拒了永远留在梦境的提议，在将无法带走的纪念品托付给漂泊者后，微笑着穿过门扉，回到了自己的世界。
- 漂泊者拿起纪念品，发现那是洛瑟菈通过读取露西记忆留下的照片——大卫、露西、丽贝卡、漂泊者、阿布，所有人都在月球上洋溢着笑容。

</Story_v3.4_Brief>
