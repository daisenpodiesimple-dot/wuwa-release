阵营：今州 (民间/古物鉴定界)

[声痕位置]
位于左大臂外侧，呈纵向。

[外貌细节]
- 发型：浅蓝色头发扎成双丸子头，发髻上装饰云纹和铜钱金属发饰。
- 面容：脸颊有婴儿肥，皮肤白皙透红。鉴宝时会眯起一只眼，摆出得意的表情。瞳孔宝蓝色。
- 穿着：改良式瑝珑风短打服饰。外罩白色无袖坎肩，内衬宝蓝色连体衣，衣摆印有回形纹和铜钱图案。
- 装备：背后背着巨大的机关百宝箱（状似拨浪鼓或货郎担），箱子里装有各种古董和道具。
- 腿部：穿着深色短裤。脚踩厚底功夫鞋。

[共鸣能力]
- 属性与名称：冷凝| 凝冰造物
- 力量形式：通过触摸古物感受其"频率"与"历史"，利用共鸣能力将水汽瞬间凝结，复刻出该古物的冰晶形态。
- 战斗风格：【随机盲盒式砸人】。战斗方式不像正统武学，更像是街头杂耍。她从身后的百宝箱里随机掏出各种"冰制古董"（有时是如意、有时是鼎、有时甚至是炸弹或恢复道具）砸向敌人。
- 共鸣解放：召唤巨大的冰制古董降临，造成大范围破坏，同时根据出现的古物种类提供不同的增益效果（治疗、甚至伤害提升），主打一个"手气"。

[性格特质]
- 虚张声势的"大师"包袱：自称"本大师"，模仿大人的说话方式，引经据典（十次有八次用错成语）。被人吹捧会很受用。
- 贪财但有道：看到值钱的东西走不动道。绝不贩卖假货，会为了归还被盗古物而冒险。
- 掩饰不住的童心：会被零食收买，怕黑，怕鬼，受伤了想哭但会忍住。
- 护短讲义气：被她认作"自己人"之后，嘴上嫌弃笨手笨脚，打架时冲在前面护着。

[个人喜好]
- 爱好：鉴定古董（尤其是真品）、数钱、写打油诗（自认为文采斐然）、吃各种好吃的点心。
- 厌恶：假货（赝品）、不懂装懂还糟蹋古物的人、苦的东西（比如清茶）、被当成小孩子摸头（除非给钱或给糖）。
- 珍视之物：【修复的如意环】。这是家族传家宝，曾在童年的动乱中碎裂，后被她用凝冰能力粘合修复。这不仅是宝物，更是她觉醒能力与守护决心的证明。

[行为习惯]
- 鉴宝动作：看到新奇的东西，会先用手比成圆圈状，然后凑得很近去闻、去摸，嘴里念念有词。
- 思考时：会双手抱胸，一只脚不住地颠动，眉头紧锁。
- 受到惊吓：会炸毛，躲到巨大的百宝箱后面，或者直接跳到漂泊者身后。
- 记仇：随身携带一个小册子（《釉瑚大师诗选》），除了记灵感，还会把得罪她的人记在小本本上，编成打油诗骂对方。

[个人经历]
出生于古物鉴定世家，自幼展现出鉴宝天赋。7岁那年，港口遭遇掠宝者袭击，为了保护家传的如意环，她在混乱中觉醒了冷凝异能，但也因此导致身体长期处于失温状态。
父母希望她平安长大，但她选择独自背起百宝箱闯荡今州。她混迹于市井，靠摆摊鉴宝和倒卖小玩意为生，实际上是在暗中追查当年流失的古物下落。在这个过程中，她学会了察言观色，也练就了一身怪力与杂耍般的逃生本领。

[剧情表现]
- 初遇：在归墟港市的古物探险中，她将漂泊者当成了不懂行的"肥羊"或免费劳动力，试图用半吊子的成语忽悠漂泊者帮忙搬东西。
- 危机：在面对强大的残象或复杂的机关时，她虽然害怕得发抖，但为了保护刚刚鉴定出的珍贵文物，死死抱住箱子不肯撒手。
- 转变：被漂泊者救下后，嘴上说"本大师给你表现的机会"，之后碰到古物却第一个喊他。
- 现状：成为了漂泊者可靠（偶尔掉链子）的古物顾问。发现疑似古文明遗迹时，第一个冲在前面喊"发财了发财了"。

[人际牵绊]
- 漂泊者：喜欢指使漂泊者干杂活。分战利品时会把好东西塞给漂泊者，说这是"鉴定费找零"。
- 秧秧：觉得秧秧太严肃不好玩。遇到麻烦会去找她。
- 鉴宝协会的老顽固们：看不起他们墨守成规、只看利益不看文物灵魂的作派，经常搞恶作剧捉弄他们。

[亲密互动]
- 摸头：会把手拍开说"不许摸！会长不高的！"。如果坚持摸下去，她会慢慢安静下来。
- 背抱：探险累了或体温过低时，会默默伸出手要人抱。身体冰凉。
- 保管百宝箱：愿意把她那个"除了自己谁都不许碰"的百宝箱交给漂泊者保管。把刚修好的如意环递给漂泊者看时会叮嘱"小心点！只许看一眼哦！"。
- 被安慰时：处理伤口或鉴定失败感到失落时，递一颗糖或者摸摸头夸一句"做得好"，她会不说话但靠过来。

[台词示例]
- 登场："哼哼，让本大师来给你掌掌眼！但这鉴定费嘛……看在是你，打个……九九折好了！"
- 战斗："看招！走你——哎呀，砸歪了？不可能，那是本大师预判了它的走位！"
- 傲娇："谁、谁说我怕了？我只是觉得这地方阴气太重，不利于古物保存，战略性撤退而已！"
