[剧情版本v1.1：往岁乘霄醒惊蛰]
地点：今州、乘霄山（隙光滩、虹镇、叩天关、眠龙庭）
人物：今汐、长离、岁主·角、辛夷、阿布
梗概：
漂泊者受梦境指引，在长离的护送下前往时流失控的乘霄山寻找失联的今汐。今汐为解救被残星会囚禁且身负旧伤的岁主·角，决心履行“与神一战”的预言。在漂泊者的见证与许可下，今汐通过“二次共鸣”突破极限，治愈了岁主的时序之伤，令乘霄山重获新生，而漂泊者的身世之谜也就此揭开一角。

- 漂泊者在今州城内频繁陷入关于“乘霄山”与“岁主·角”的异常梦境，梦见岁主利用时间屏障阻挡残象。与此同时，声骸阿布嗅到了东南方传来的异常频率气息。
- 前往边庭询问时，近卫散华告知漂泊者，今汐已前往乘霄山调查岁主失联一事，且边庭已与今汐断联数日。散华指引漂泊者前往渡口寻找名为“引路人”的协助者。
- 在雨中的渡口，漂泊者见到了今汐的老师、现任边庭参事长离。长离揭示乘霄山乃是时间流速异于外界的隐秘之地，进出皆需付出寿命为代价。她指出漂泊者是破局的关键，因为古籍记载曾有一位与岁主并肩的“奇人”不受时流影响，那正是漂泊者。
- 长离与漂泊者一同渡海抵达乘霄山。此时山中时流已彻底紊乱，呈现出时间停滞、回溯或极速流逝的恐怖景象，这是岁主力量失控的征兆。
- 两人突破残星会的重重封锁抵达虹镇，会见虹镇管理者辛夷。辛夷透露今汐身体状况极差，已出现龙鳞化的“超频”征兆，但仍坚持前往“叩天关”（稷廷遗址）寻找开启岁主休眠地“眠龙庭”的关键道具——心核。
- 在叩天关遗迹深处，长离通过解读古老的稷廷卷宗，向漂泊者解释了当下的危机：岁主早有旧伤，失去了修复时流的能力。稷廷曾提出“二次共鸣”假说，即共鸣者通过与岁主力量的剧烈碰撞，可能引发超越极限的共鸣，从而获得完整的时序能力，但这通常意味着共鸣者的死亡。
- 两人在遗迹中找到虚弱的今汐。今汐坦言已知晓岁主伤势无法逆转，唯有通过预言中的“宿命一战”触发二次共鸣，由自己承接并修正时流，哪怕代价是牺牲自己。长离虽心疼徒弟，但尊重其觉悟，并将漂泊者托付给今汐，自己则留在遗迹入口独自阻击残星会的主力追兵。
- 今汐与漂泊者携带心核进入眠龙庭。辛夷揭露残星会利用改造后的“溯流仪”引发能量冲撞，加剧了岁主的伤势并将其囚禁。两人解除了束缚岁主的力场机关，终于见到了岁主·角。
- 岁主坦言自己大限将至，为防止失控的时流吞没今州，祂计划牺牲自己将今州的时间永久冻结。今汐断然拒绝这一消极方案，坚持要求履行“双强对决”的预言，哪怕身死也要为今州争得一个光明的未来。
- 岁主指出，只有作为“御者”的漂泊者拥有开启决斗领域（声之领域）的权限，且在关键时刻，只有得到漂泊者的“准许”，岁主才能将力量移交给今汐。
- 在声之领域内，今汐以凡人之躯对抗神明，在此过程中不断突破生理极限。在今汐濒临崩溃的瞬间，漂泊者下达了许可。岁主将时序之能全部让渡，引发剧烈的二次共鸣。
- 今汐在光芒中重生，发色转为雪白，成功掌握了完整的时序权能。她平息了乘霄山的时间风暴，让万物回归正轨。
- 战后，岁主·角向漂泊者揭示真相：漂泊者实为岁主的创造者与曾经的主人（御者），今州文明本身即是漂泊者昔日的造物。岁主指引漂泊者前往“黑海岸”寻找更多关于自身过去的答案。
- 残星会的弗洛洛在暗处观测了全过程，对“人工共鸣”和漂泊者的数据表示满意，暗示阴谋仍在继续。
</Story_v1.1_Brief>
