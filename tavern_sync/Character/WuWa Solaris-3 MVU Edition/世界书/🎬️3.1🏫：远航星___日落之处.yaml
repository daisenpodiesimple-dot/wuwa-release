[剧情版本v3.1：远航星 / 日落之处]
地点：拉海洛 (星炬学院、罗伊冰原、天槎空间站、渐湖、隧者沉眠地、坠剑湖密室)
人物：漂泊者, 爱弥斯, 陆·赫斯, 洛瑟菈, 残星会会长 (伪装成娜波摩), 魏尔伦

梗概：为解决频率流失，漂泊者邂逅已故适格者爱弥斯的电子幽灵。两人在对抗神秘机兵的旅途中，揭开了曾如家人般共同生活的过往，以及漂泊者被故乡抛弃的真相。爱弥斯为完成拯救漂泊者的因果闭环而奔赴过去。爱弥斯消失后，漂泊者与陆·赫斯联手追查残星会，在冰原的最后交心中重拾信念，决心将她救回。

- 漂泊者因频率流失在课堂上邂逅只有自己能见的电子幽灵爱弥斯。爱弥斯告知，他身上携带着的“隧者炉芯核心”是维持她存在的关键，但她的力量正被神秘机兵“辛吉勒姆”夺取。
- 为击败辛吉勒姆，爱弥斯请求漂泊者携带核心重游生前故地。旅途中漂泊者得知爱弥斯即网络歌手“飞行雪绒”，并在天槎空间站截获影像，震惊发现自己竟是穿越“天空海”坠落的天外来客。
- 在渐湖小屋旁，两人遭辛吉勒姆袭击，爱弥斯坠入湖中。漂泊者跳湖相救，在虚质中目睹“现在的自己”救起“年幼的爱弥斯”，完成时空闭环的第一次交错。
- 躲入小屋后，漂泊者通过旧物忆起自己曾是收养爱弥斯的“家人”。爱弥斯坦言成为适格者正是为了兑现童年“保护漂泊者”的誓言。
- 隧者沉眠地决战中，爱弥斯将两人拉入心象空间。辛吉勒姆面具碎裂，露出漂泊者的脸——它是由漂泊者被故乡抛弃后的“思乡”执念异化而成。爱弥斯用“黑猫与纸盒”寓言引导漂泊者直面真相，解开心结后辛吉勒姆消散，爱弥斯彻底恢复实体。
- 复活的爱弥斯在学院举办演唱会，与漂泊者度过最后二十四小时的恋人时光。趁他熟睡，她独自逆转时间流，回到过去救下初抵拉海洛的漂泊者，并帮助隧者封印阿列夫一，完成因果闭环。
- 漂泊者惊醒后追至渐湖，只见虚质中她离去的背影。最终在虚境作训场找到爱弥斯留下的无意识躯壳，手中紧攥着纸飞机。数日后运载栈上，躯壳在漂泊者的许诺下抬手完成“刮鼻子”动作，留下“别难过”后归于沉寂。
- 爱弥斯消失后，漂泊者与陆·赫斯联手调查。陆在坠剑湖密室揭露自身过往：曾是“日髓”实验唯一适格者，养父被残星会会长杀害顶替，弟弟莱伊因实验而亡，潜伏学院只为追查会长。
- 陆为漂泊者争取隧者驾驶资格的同时，魏尔伦越狱挟持娜波摩逃往天槎空间站。两人追击至空间站，陆制服魏尔伦后，伪装成娜波摩的会长现身偷袭灭口魏尔伦，被漂泊者一剑斩为粒子。会长重组后取回钢笔，透露学院仍有暗桩，随后消散。
- 陆通过终端资料确认会长早在数百年前就以“未楹”身份活动，并推测正是会长当年破坏浮光林封印，导致爱弥斯肉体死亡成为电子幽灵。漂泊者闻讯强压悲愤。
- 冰原风雪中，陆用自己吃糖的故事开导漂泊者：糖是为了在无数失去中记住相逢的甘甜。漂泊者主动要了一颗糖，问出“救回爱弥斯的几率是不是很小”，陆答：“像奇迹那么小——但你总能创造奇迹。”
- 漂泊者重拾信念，决心踏上拯救爱弥斯的旅途。而渐湖小屋中，爱弥斯的躯壳依旧静静坐着，手中纸飞机仿佛仍在等待那个永远不会忘记她的人。
</Story_v3.1_Brief>
